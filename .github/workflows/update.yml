name: Update formulas

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: update-formulas
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    container: ghcr.io/homebrew/brew:main

    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef # 2026.07.20.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef # 2026.07.20.1

      - name: Open update pull requests
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: brew bump --formula --tap=SeWieland/transiever --open-pr --no-fork

  auto-merge-formulas:
    name: Enable auto-merge for formula updates
    needs: update
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge for formula update PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --repo "$GITHUB_REPOSITORY" --state open --base main --json author,url --jq '.[] | select(.author.login == "github-actions[bot]") | .url' |
            while read -r pr_url; do
              [ -z "$pr_url" ] && continue
              files="$(gh pr diff --repo "$GITHUB_REPOSITORY" --name-only "$pr_url")"
              if [ -z "$files" ] || printf '%s\n' "$files" | grep -qvE '^Formula/[^/]+\.rb$'; then
                echo "Skipping $pr_url: it changes files outside Formula/*.rb."
                continue
              fi
              gh pr merge --repo "$GITHUB_REPOSITORY" --auto --squash "$pr_url"
            done

