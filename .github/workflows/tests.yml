name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-bot:
    runs-on: ubuntu-latest
    container: ghcr.io/homebrew/brew:main

    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef # 2026.07.20.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v6
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: linux-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: linux-rubygems-

      - run: brew test-bot --only-cleanup-before
      - run: brew test-bot --only-setup
      - run: brew test-bot --only-tap-syntax
      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'

  auto-merge-formula-update:
    name: Enable auto-merge for formula update
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.head_ref, 'update-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Verify and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          body="$(gh pr view "$PR_URL" --json body --jq .body)"
          if [ "$body" != "Created by https://github.com/mislav/bump-homebrew-formula-action" ]; then
            echo "Skipping $PR_URL: it was not created by the formula updater."
            exit 0
          fi

          files="$(gh pr diff "$PR_URL" --name-only)"
          case "$files" in
            Formula/msieve.rb|Formula/srtx.rb|Formula/tbrx.rb) ;;
            *)
              echo "Skipping $PR_URL: it is not a single known formula update."
              exit 0
              ;;
          esac

          gh pr merge --auto --squash --subject "$PR_TITLE" "$PR_URL"

