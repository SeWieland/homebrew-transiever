name: Dependabot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge patch and minor updates
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for workflow changes
        id: file_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if gh pr diff --name-only "$PR_URL" | grep -q '^\.github/workflows/'; then
            echo 'auto_merge=false' >> "$GITHUB_OUTPUT"
            echo 'Workflow changes require manual merge.'
          else
            echo 'auto_merge=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Approve and enable auto-merge
        if: (steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor') && steps.file_check.outputs.auto_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash --subject "$PR_TITLE" "$PR_URL"
